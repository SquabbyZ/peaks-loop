# dist-tag-move — one-shot workflow to move peaks-loop@latest to a target version.
#
# Trigger: workflow_dispatch (manual). Operator confirms the target version
# + the package name in the dispatch inputs; the workflow re-tags
# `latest` to point at the chosen version via the npm OIDC flow.
#
# Why: when peaks-loop@4.0.x is published with `--tag=latest` AND a prior
# peaks-loop@4.0.y already has `latest` on the registry, the publish
# script's `isAlreadyPublished` short-circuit SKIPS the root, so the
# `latest` dist-tag never moves. Use this workflow to move the tag
# post-hoc. Hardcoded for `peaks-loop` (the only package where this
# matters for the 4.1 release dance).

name: dist-tag-move

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Version to set as `latest` (must already be on the registry).'
        type: string
        required: true
        default: '4.0.0-beta.22'

permissions:
  contents: read
  id-token: write

concurrency:
  group: dist-tag-move
  cancel-in-progress: false

jobs:
  retag:
    name: trusted-retag (OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to 11+ (OIDC Trusted Publishing)
        run: npm install -g npm@latest

      - name: npm dist-tag add <package>@<version> latest (Trusted Publishing + OIDC)
        env:
          INPUT_TARGET_VERSION: ${{ inputs.target_version }}
        run: |
          # npm 11+ supports OIDC for `npm publish` but NOT for
          # `npm dist-tag add` (still requires a legacy bearer token).
          # We acquire the OIDC JWT directly from the GitHub Actions
          # OIDC provider and exchange it at the npm registry's
          # `-/npm/v1/oidc/token/exchange/` endpoint, then use the
          # resulting bearer token against the dist-tag PUT.
          set -euo pipefail

          # 1. Get the OIDC JWT for npm-registry.
          oidc_jwt=$(curl -sS \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL:-}audience=repo:registry.npmjs.org&expiration=900")
          if [ -z "${oidc_jwt}" ] || [ "${oidc_jwt}" = "null" ]; then
            echo "::error::failed to acquire OIDC JWT (ACTIONS_ID_TOKEN_REQUEST_URL=${ACTIONS_ID_TOKEN_REQUEST_URL:-unset})"
            exit 1
          fi

          # 2. Exchange for an npm publish token.
          exchange_response=$(curl -sS -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data "{\"token\":\"${oidc_jwt}\"}")
          npm_token=$(echo "${exchange_response}" | node -e "let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{const j=JSON.parse(d); process.stdout.write(j.token||'')})")
          if [ -z "${npm_token}" ]; then
            echo "::error::npm token exchange failed: ${exchange_response:0:200}"
            exit 1
          fi

          # 3. PUT the new dist-tag.
          payload='"'${INPUT_TARGET_VERSION}'"'
          status=$(curl -sS -o /tmp/dist-tag-resp.json -w '%{http_code}' \
            -X PUT \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${npm_token}" \
            --data-binary "${payload}" \
            "https://registry.npmjs.org/-/package/peaks-loop/dist-tags/latest")
          echo "registry response (status ${status}):"
          cat /tmp/dist-tag-resp.json
          echo
          if [ "${status}" != "201" ] && [ "${status}" != "200" ]; then
            echo "::error::dist-tag move failed (status ${status})"
            exit 1
          fi
          echo "moved peaks-loop@latest to peaks-loop@${INPUT_TARGET_VERSION}"
