# One-shot unpublish workflow (2026-07-22).
#
# Context: the publish run for tag v4.0.1 (commit d4ed7a1a) accidentally
# landed peaks-loop@4.0.2 (and 8 subpackages) on npm, because the
# conditional `pnpm exec changeset version` step in publish.yml ran with
# one pending changeset in .changeset/ and overrode the maintainer's
# manual version pin (4.0.0 -> 4.0.1) to a derived bump (4.0.2). The
# 4.0.0-beta.21 release that was actually intended never reached the
# registry.
#
# This workflow calls `npm unpublish` via the same Trusted Publisher +
# OIDC path the publish workflow uses, so no NPM_TOKEN is needed. The
# versions to unpublish are pinned in this file (no env var injection)
# because the script deliberately limits what it can remove.
#
# Versions to remove (the registry-repair bundle as of 2026-07-22):
#   - peaks-loop@4.0.2
#   - peaks-loop-shared@0.0.10
#   - peaks-loop-audit-independent@0.0.6
#   - peaks-loop-crystallization@0.0.7
#   - peaks-loop-doctor@0.0.6
#   - peaks-loop-final-review@0.0.6
#   - peaks-loop-mut@0.1.0
#   - peaks-loop-shared-channel@0.0.5
#   - peaks-loop-job-snapshot@0.0.5
#
# npm contract: a published version can be unpublished within 72 hours
# (per https://docs.npmjs.com/policies/unpublish/). 4.0.2 was published
# 2026-07-22T01:53Z, so the 72h window applies.
#
# Trigger: workflow_dispatch only. This is a deliberate destructive
# action — manual run from the GitHub UI.
#
# After the run, the operator should:
#   1. Verify the registry no longer lists these versions:
#        curl -sI https://registry.npmjs.org/peaks-loop/4.0.2 | head -1
#   2. Fix publish.yml so future tags do not auto-bump past a manual
#      pin (task #14).
#   3. Re-tag the intended release (4.0.0-beta.21 or whatever the
#      operator decides) with a clean .changeset/ state.

name: unpublish-4-0-2

on:
  workflow_dispatch:
    inputs:
      confirm_destructive:
        description: 'Type "yes-i-am-sure" to confirm. Anything else aborts.'
        required: true
        type: string
        default: 'no'

permissions:
  contents: read
  id-token: write

concurrency:
  group: unpublish-4-0-2
  cancel-in-progress: false

jobs:
  unpublish:
    name: trusted-unpublish (OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Confirm destructive action (gate)
        run: |
          if [ "${{ inputs.confirm_destructive }}" != "yes-i-am-sure" ]; then
            echo "::error::run aborted: confirm_destructive must be 'yes-i-am-sure'"
            exit 1
          fi

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to 11+ (required for OIDC Trusted Publishing)
        run: npm install -g npm@latest

      - name: Unpublish pinned versions (Trusted Publishing + OIDC)
        # Pinned list: literal versions, no interpolation from PR / env.
        # Order matters for dependents: leaves-first (subpackages that
        # peaks-loop only depends on) before the root. We publish in
        # build order (sub first, root last), and unpublish is the
        # reverse — but the registry does not enforce cross-version
        # consistency, so order is informational only.
        env:
          NPM_REGISTRY: 'https://registry.npmjs.org'
        run: |
          set -euo pipefail
          versions=(
            'peaks-loop-job-snapshot@0.0.5'
            'peaks-loop-shared-channel@0.0.5'
            'peaks-loop-mut@0.1.0'
            'peaks-loop-final-review@0.0.6'
            'peaks-loop-doctor@0.0.6'
            'peaks-loop-crystallization@0.0.7'
            'peaks-loop-audit-independent@0.0.6'
            'peaks-loop-shared@0.0.10'
            'peaks-loop@4.0.2'
          )
          for pv in "${versions[@]}"; do
            echo "::group::unpublishing ${pv}"
            # `--force` is required because dependents may still
            # reference this version in their published 4.0.2 manifest.
            # The 72h unpublish window applies.
            if npm unpublish "${pv}" --force --registry="${NPM_REGISTRY}"; then
              echo "::notice title=unpublished::${pv}"
            else
              echo "::warning title=unpublish-failed::${pv} (continuing)"
            fi
            echo "::endgroup::"
          done
          echo "::notice title=done::all unpublish attempts complete"

      - name: Post-unpublish verification
        # Probe the registry for each pinned version. A non-200 means
        # the version has been removed. This step is informational; a
        # post-unpublish cache delay (≤ a few seconds) can leave a
        # single 200 even though the registry has committed the remove.
        env:
          NPM_REGISTRY: 'https://registry.npmjs.org'
        run: |
          for pv in \
            'peaks-loop@4.0.2' \
            'peaks-loop-shared@0.0.10' \
            'peaks-loop-audit-independent@0.0.6' \
            'peaks-loop-crystallization@0.0.7' \
            'peaks-loop-doctor@0.0.6' \
            'peaks-loop-final-review@0.0.6' \
            'peaks-loop-mut@0.1.0' \
            'peaks-loop-shared-channel@0.0.5' \
            'peaks-loop-job-snapshot@0.0.5' \
          ; do
            status=$(curl -s -o /dev/null -w '%{http_code}' "${NPM_REGISTRY}/${pv}" || echo 000)
            echo "  ${pv} -> ${status}"
          done
