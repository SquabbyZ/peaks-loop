# peaks-loop Trusted Publishing (OIDC) via changesets
#
# Trigger:
#   - push tag v*.*.*
#   - workflow_dispatch (manual from GitHub UI)
#
# Chain:
#   install → build (incl. subpackage builds + root tsc) → vitest
#     → changesets version → changesets publish
#
# Permissions:
#   - contents: read    (checkout code)
#   - id-token: write   (OIDC: npmjs trusted publisher will validate this JWT)
#
# Pinned versions:
#   - actions/checkout@v4
#   - pnpm/action-setup@v4
#   - actions/setup-node@v4
#   - pnpm 10.11.0  (matches package.json#packageManager)
#   - Node 22.x    (matches package.json#engines.node ">=20")
#
# No npm token is required / used / stored.
# npmjs side: Settings → Trusted Publishers → Add GitHub Action
# (Owner=SquabbyZ, Repo=peaks-loop, Workflow=publish.yml)

name: publish

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Default to least privilege. `id-token: write` is REQUIRED for npm OIDC;
# removing it will fail the publish step with "Cannot get JWT".
permissions:
  contents: read
  id-token: write

concurrency:
  # Cancel in-flight manual retries so only one publish runs at a time.
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: trusted-publish (changesets + OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          # npm CLI 11+ OIDC Trusted Publishing requires setup-node to
          # know which registry to exchange the GitHub Actions OIDC JWT
          # against. Without this, npm CLI treats the publish as
          # unauthenticated and returns ENEEDAUTH instead of triggering
          # the OIDC flow. See https://docs.npmjs.com/trusted-publishers/
          # — Step 2 "Configure your CI/CD workflow" example.
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to 11+ (required for OIDC Trusted Publishing)
        # Node 22.23.1 on the runner ships npm 10.9.8, but npm OIDC
        # Trusted Publishing was added in npm 11.5.1 (per npm docs).
        # Without this upgrade, npm CLI does not know how to exchange
        # the GitHub Actions OIDC JWT for a publish token — npm sees
        # the request as anonymous and returns ENEEDAUTH/E404.
        # 'lts/*' pins to whatever the latest stable npm line is.
        run: npm install -g npm@latest

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build (runs subpackage builds before root tsc — required so
          # workspace:* deps provide dist/* .d.ts/.js exports for typecheck
          # resolution against `tsconfig.build.json`; standalone tsc before
          # this step will fail with "Cannot find module 'peaks-loop-shared/*'")
        run: pnpm run build

      # Typecheck is now performed as part of `pnpm run build` (the root
      # tsc -p tsconfig.build.json step, gated by subpackage dist presence).

      - name: Vitest (unit only — integration suite is exercised by tests/manual)
        # Rationale: the publish pipeline must stay green even when a slow
        # integration test flakes. Integration tests (tests/integration/**)
        # spawn real child processes and need a hand-tuned sandbox; they
        # are out of scope for release-time smoke. Run the full suite
        # locally with `pnpm run test:full` or in the `tests` workflow on PR.
        run: pnpm exec vitest run --reporter=default tests/unit
        env:
          TZ: UTC

      - name: Changesets version (no-op if already versioned locally)
        # If the maintainer already ran `pnpm changeset version` and committed
        # the resulting package.json bump + CHANGELOG.md update, this is a
        # no-op. If not, this promotes the pending .changeset/*.md entries
        # into a version bump on the current commit.
        run: pnpm exec changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm (OIDC + per-package script)
        # Strategy:
        #   - Main package peaks-loop uses OIDC (Trusted Publisher already
        #     configured on npmjs.com).
        #   - The 6 subpackages (peaks-loop-{shared,mut,doctor,
        #     crystallization,final-review,audit-independent}) each need
        #     their OWN Trusted Publisher entry on npmjs.com — until those
        #     are configured (one-time browser step per package), their
        #     publish is attempted but a failure does NOT block the main
        #     package release.
        #
        # TODO 2026-07-17-D22: once each subpackage has its own Trusted
        # Publisher on npmjs.com, drop the per-package publish loop below
        # and let changesets publish all 7 packages via OIDC in one go.
        run: |
          echo ":: Publishing subpackages individually (each needs its own npmjs Trusted Publisher) ::"
          for pkg in peaks-loop-shared peaks-loop-mut peaks-loop-doctor \
                     peaks-loop-crystallization peaks-loop-final-review \
                     peaks-loop-audit-independent \
                     peaks-loop-job-snapshot peaks-loop-shared-channel; do
            echo "::: Publishing $pkg via changesets (OIDC) :::"
            pnpm --filter "$pkg" exec changeset publish --tag=latest 2>&1 || {
              echo "::warning::$pkg publish failed (likely needs npmjs Trusted Publisher setup). Continuing."
            }
          done
          echo ":: Publishing main peaks-loop package via changesets (OIDC) ::"
          pnpm exec changeset publish --tag=latest
        # NO NODE_AUTH_TOKEN here — npm CLI 11 + changesets interprets
        # any NODE_AUTH_TOKEN as "I have credentials, use those", which
        # suppresses the OIDC Trusted Publishing flow that npmjs.com is
        # actually configured for. The publish.yml permission block
        # above already grants id-token: write, so the OIDC JWT will
        # be minted automatically; NODE_AUTH_TOKEN must remain unset.