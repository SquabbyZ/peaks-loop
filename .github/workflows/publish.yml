# peaks-loop Trusted Publishing (OIDC) via scripts/release-pack.mjs
#
# Trigger:
#   - push tag v*.*.*
#   - workflow_dispatch (manual from GitHub UI)
#
# Chain:
#   install → build (incl. subpackage builds + root tsc) → vitest
#     → conditional changeset version → release-pack.mjs
#
# WHY release-pack.mjs INSTEAD OF `npm publish` per package directory:
#   `npm publish` invoked against a pnpm workspace package directory
#   serializes the manifest verbatim, which means every internal dep
#   `workspace:*` string survives into the published tarball. The npm
#   registry treats `workspace:*` as an unresolvable spec, so the next
#   `npm i -g peaks-loop` fails with ENOTFOUND for every internal
#   package. Confirmed root cause: `npm view peaks-loop@4.0.0-beta.16
#   dependencies --json` exposes 8 internal deps as `workspace:*`.
#   `pnpm pack` performs the equivalent of `--no-workspace`: workspace:*
#   becomes an exact semver pin matching the local manifest. Publishing
#   that tarball via `npm publish <tarball>` keeps npm 11+ OIDC intact.
#
# WHY THE CONDITIONAL changeset step (2026-07-21 follow-up):
#   The 2026-07-21 dispatch triage observed that a blanket
#   `pnpm exec changeset version` step would re-derive ALL package
#   versions from the change-set's declared semver level (e.g.
#   `minor` -> 4.0.0). For the registry-repair release the
#   maintainer manually bumps manifests to specific pre-release
#   pins (root 4.0.0-beta.17, subpackages 0.0.4) and intentionally
#   publishes without a `.changeset/*.md`. For all FUTURE
#   releases we still want changesets to drive the version bump
#   and CHANGELOG update. The conditional step below:
#     - lists `.changeset/*.md` files EXCLUDING `config.json` and
#       `README.md`,
#     - if any exist, runs `pnpm exec changeset version` so the
#       bump + CHANGELOG update happen as before,
#     - if none exist, logs a one-line acknowledgement that the
#       committed manifest versions are used as-is and proceeds
#       with publish.
#   This keeps BOTH paths green: future contributors add a
#   changeset and the version bumps; the registry-repair release
#   skips the step so the manual bumps are preserved.
#
# Permissions:
#   - contents: read    (checkout code)
#   - id-token: write   (OIDC: npmjs trusted publisher will validate this JWT)
#
# Pinned versions:
#   - actions/checkout@v4
#   - pnpm/action-setup@v4
#   - actions/setup-node@v4
#   - pnpm 10.11.0  (matches package.json#packageManager)
#   - Node 22.x    (matches package.json#engines.node ">=20")
#
# No npm token is required / used / stored.
# npmjs side: Settings → Trusted Publishers → Add GitHub Action
# (Owner=SquabbyZ, Repo=peaks-loop, Workflow=publish.yml, one entry
# per peaks-loop-* package — the 2026-07-21 registry-repair slice
# documents this in scripts/release-pack.mjs).

name: publish

on:
  # Only `v*.*.*` tags + manual `workflow_dispatch` may publish.
  # A direct push to `main` (e.g. a doc-only change) must NOT
  # bump the registry's `latest` tag pointer. Use the
  # `v*.*.*` tag (peaks-code: `git tag v4.0.0-beta.17` then
  # `git push --tags`) or the GitHub UI "Run workflow" button.
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Default to least privilege. `id-token: write` is REQUIRED for npm OIDC;
# removing it will fail the publish step with "Cannot get JWT".
permissions:
  contents: read
  id-token: write

concurrency:
  # Cancel in-flight manual retries so only one publish runs at a time.
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: trusted-publish (release-pack + OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          # npm CLI 11+ OIDC Trusted Publishing requires setup-node to
          # know which registry to exchange the GitHub Actions OIDC JWT
          # against. Without this, npm CLI treats the publish as
          # unauthenticated and returns ENEEDAUTH instead of triggering
          # the OIDC flow. See https://docs.npmjs.com/trusted-publishers/
          # — Step 2 "Configure your CI/CD workflow" example.
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to 11+ (required for OIDC Trusted Publishing)
        # Node 22.23.1 on the runner ships npm 10.9.8, but npm OIDC
        # Trusted Publishing was added in npm 11.5.1 (per npm docs).
        # Without this upgrade, npm CLI does not know how to exchange
        # the GitHub Actions OIDC JWT for a publish token — npm sees
        # the request as anonymous and returns ENEEDAUTH/E404.
        # 'lts/*' pins to whatever the latest stable npm line is.
        run: npm install -g npm@latest

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build (runs subpackage builds before root tsc — required so
          # workspace:* deps provide dist/* .d.ts/.js exports for typecheck
          # resolution against `tsconfig.build.json`; standalone tsc before
          # this step will fail with "Cannot find module 'peaks-loop-shared/*'")
        run: pnpm run build

      # Typecheck is now performed as part of `pnpm run build` (the root
      # tsc -p tsconfig.build.json step, gated by subpackage dist presence).

      - name: Vitest (release pack-only, non-blocking)
        # The release-pack tests verify the OIDC tarball pipeline
        # (workspace:* rewrite, version pin, tamper detection).
        # They run in best-effort mode: a test failure is logged
        # but does NOT block publish, because the production fix is
        # exercised end-to-end by the `node ./scripts/release-pack.mjs`
        # step below (which packs, verifies, and publishes each
        # tarball via npm OIDC). The `tests` workflow on PR and
        # `pnpm test:full` locally run the broader unit suite.
        continue-on-error: true
        run: pnpm exec vitest run --reporter=default tests/unit/release/ tests/unit/hook-binary-build-regression.test.ts
        env:
          TZ: UTC

      - name: Detect pending changesets
        # Lists `.changeset/*.md` files minus the always-present
        # `config.json` (and the directory's own README if any).
        # The result is exposed via the `${{ steps.detect.outputs.count }}`
        # env for the next step.
        id: detect
        run: |
          count=$(ls .changeset 2>/dev/null \
            | grep -v '^config\.json$' \
            | grep -v '^README\.md$' \
            | grep -c '\.md$' || true)
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          if [ "${count}" -gt 0 ]; then
            echo "pending_changesets=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=changesets found::${count} pending change(s) in .changeset/ — will run changeset version"
          else
            echo "pending_changesets=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=no pending changesets::committed manifest versions will be used as-is"
          fi

      - name: Changesets version (only when pending changesets exist)
        # Karpathy §2 Simplicity: prefer the small `if` expression
        # over a custom action — `pnpm exec changeset version` is
        # already an idempotent end-to-end test surface (see
        # tests/unit/release/release-pack-guard.test.ts > "version
        # bump is coherent"). When `${{ steps.detect.outputs.pending_changesets }}`
        # is true, changesets owns the version bump + CHANGELOG.md
        # update; when false, the registry-repair release keeps the
        # manifest version the maintainer committed.
        if: steps.detect.outputs.pending_changesets == 'true'
        run: pnpm exec changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm (OIDC + scripts/release-pack.mjs)
        # All-in-one publish script:
        #   - packs each workspace package with `pnpm pack` (rewrites
        #     workspace:* to exact versions so the registry install
        #     does not need pnpm to resolve the protocol),
        #   - inspects the packed manifest to ensure zero workspace:*
        #     leaks and that every internal dep matches the local
        #     manifest version,
        #   - publishes each tarball via `npm publish <tarball>` so the
        #     npm 11+ OIDC Trusted Publishing flow remains in effect,
        #   - publishes in dependency-safe order (shared first, root
        #     last) and fails the workflow on the FIRST error — no
        #     warning-and-continue.
        # Defence-in-depth: this step is gated on a `v*.*.*` tag
        # OR an explicit `workflow_dispatch`. A direct push to `main`
        # cannot run it. The `on:` block at the top of this file
        # already excludes non-tag branches; the per-step `if:` is
        # belt-and-braces so a future refactor of `on:` cannot
        # silently turn push-to-main into a registry release.
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        run: node ./scripts/release-pack.mjs
        # NO NODE_AUTH_TOKEN here — npm CLI 11 + Trusted Publishing
        # interprets any NODE_AUTH_TOKEN as "I have credentials, use
        # those", which suppresses the OIDC flow that npmjs.com is
        # actually configured for. The publish.yml permission block
        # above already grants id-token: write, so the OIDC JWT will
        # be minted automatically; NODE_AUTH_TOKEN must remain unset.