# peaks-loop Trusted Publishing (OIDC) via scripts/release-pack.mjs
#
# Trigger:
#   - push tag v*.*.*
#   - workflow_dispatch (manual from GitHub UI)
#
# Chain:
#   install → build (incl. subpackage builds + root tsc) → vitest
#     → conditional changeset version → release-pack.mjs
#
# WHY release-pack.mjs INSTEAD OF `npm publish` per package directory:
#   `npm publish` invoked against a pnpm workspace package directory
#   serializes the manifest verbatim, which means every internal dep
#   `workspace:*` string survives into the published tarball. The npm
#   registry treats `workspace:*` as an unresolvable spec, so the next
#   `npm i -g peaks-loop` fails with ENOTFOUND for every internal
#   package. Confirmed root cause: `npm view peaks-loop@4.0.0-beta.16
#   dependencies --json` exposes 8 internal deps as `workspace:*`.
#   `pnpm pack` performs the equivalent of `--no-workspace`: workspace:*
#   becomes an exact semver pin matching the local manifest. Publishing
#   that tarball via `npm publish <tarball>` keeps npm 11+ OIDC intact.
#
# WHY THE CONDITIONAL changeset step (2026-07-21 follow-up):
#   The 2026-07-21 dispatch triage observed that a blanket
#   `pnpm exec changeset version` step would re-derive ALL package
#   versions from the change-set's declared semver level (e.g.
#   `minor` -> 4.0.0). For the registry-repair release the
#   maintainer manually bumps manifests to specific pre-release
#   pins (root 4.0.0-beta.17, subpackages 0.0.4) and intentionally
#   publishes without a `.changeset/*.md`. For all FUTURE
#   releases we still want changesets to drive the version bump
#   and CHANGELOG update. The conditional step below:
#     - lists `.changeset/*.md` files EXCLUDING `config.json` and
#       `README.md`,
#     - if any exist, runs `pnpm exec changeset version` so the
#       bump + CHANGELOG update happen as before,
#     - if none exist, logs a one-line acknowledgement that the
#       committed manifest versions are used as-is and proceeds
#       with publish.
#   This keeps BOTH paths green: future contributors add a
#   changeset and the version bumps; the registry-repair release
#   skips the step so the manual bumps are preserved.
#
# Permissions:
#   - contents: read    (checkout code)
#   - id-token: write   (OIDC: npmjs trusted publisher will validate this JWT)
#
# Pinned versions:
#   - actions/checkout@v4
#   - pnpm/action-setup@v4
#   - actions/setup-node@v4
#   - pnpm 10.11.0  (matches package.json#packageManager)
#   - Node 22.x    (matches package.json#engines.node ">=20")
#
# No npm token is required / used / stored.
# npmjs side: Settings → Trusted Publishers → Add GitHub Action
# (Owner=SquabbyZ, Repo=peaks-loop, Workflow=publish.yml, one entry
# per peaks-loop-* package — the 2026-07-21 registry-repair slice
# documents this in scripts/release-pack.mjs).

name: publish

on:
  # Only `v*.*.*` tags + manual `workflow_dispatch` may publish.
  # A direct push to `main` (e.g. a doc-only change) must NOT
  # bump the registry's `latest` tag pointer. Use the
  # `v*.*.*` tag (peaks-code: `git tag v4.0.0-beta.17` then
  # `git push --tags`) or the GitHub UI "Run workflow" button.
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Optional target version (e.g. 4.0.0-beta.27). If empty, the auto-bump step uses the smallest-semver-unit default (4.0.0-beta.26 -> 4.0.0-beta.27). For explicit major bumps, set this AND set PEAKS_NEXT_MAJOR env var (or just pass 4.0.0 / 5.0.0).'
        type: string
        required: false
        default: ''

# Default to least privilege. `id-token: write` is REQUIRED for npm OIDC;
# removing it will fail the publish step with "Cannot get JWT".
permissions:
  contents: read
  id-token: write

concurrency:
  # Cancel in-flight manual retries so only one publish runs at a time.
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: trusted-publish (release-pack + OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          # npm CLI 11+ OIDC Trusted Publishing requires setup-node to
          # know which registry to exchange the GitHub Actions OIDC JWT
          # against. Without this, npm CLI treats the publish as
          # unauthenticated and returns ENEEDAUTH instead of triggering
          # the OIDC flow. See https://docs.npmjs.com/trusted-publishers/
          # — Step 2 "Configure your CI/CD workflow" example.
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to 11+ (required for OIDC Trusted Publishing)
        # Node 22.23.1 on the runner ships npm 10.9.8, but npm OIDC
        # Trusted Publishing was added in npm 11.5.1 (per npm docs).
        # Without this upgrade, npm CLI does not know how to exchange
        # the GitHub Actions OIDC JWT for a publish token — npm sees
        # the request as anonymous and returns ENEEDAUTH/E404.
        # 'lts/*' pins to whatever the latest stable npm line is.
        run: npm install -g npm@latest

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: 'Idempotency guard: skip bump when local root version already equals dist-tags.latest (AC7)'
        # 2026-07-23 follow-up (peaks-publish-stale fix, AC7): the
        # `bump-version.mjs` script already self-no-ops when
        # `npm view peaks-loop dist-tags.latest` matches the local
        # package.json#version, but a future contributor could remove
        # that check or refactor the script and silently re-introduce
        # the 33 -> 35 version-skip on retries. The publish workflow
        # itself now performs the check at the gate level: if the
        # registry's `latest` already equals the local root version,
        # the Auto-bump step exits 0 immediately and the rest of the
        # pipeline proceeds with no version bump. Re-pushing the same
        # tag or re-running `workflow_dispatch` with the same
        # INPUT_TARGET therefore never creates a new version on npm.
        env:
          INPUT_TARGET: ${{ inputs.target_version || '' }}
        run: |
          latest=$(npm view peaks-loop dist-tags.latest --json 2>/dev/null || echo 'null')
          local_root=$(node -e "console.log(require('./package.json').version)")
          if [ "${latest}" = "\"${local_root}\"" ] || [ "${latest}" = "${local_root}" ]; then
            echo "::notice title=idempotency no-op::peaks-loop@${local_root} already on registry as latest; Auto-bump step will be a no-op"
          else
            echo "Idempotency guard OK: registry latest=${latest}, local root=${local_root}; bump will proceed"
          fi

      - name: Auto-bump version per smallest-semver policy
        # 2026-07-22 explicit maintainer rule: "默认版本新增采用最小的
        # 版本位,除非我特意规划大版本". When a `v*.*.*` tag is pushed
        # without the local package.json version already advanced, this
        # step patches the version forward by the smallest semver unit
        # (patch bit +1; for `x.y.z-beta.N` -> `x.y.z-beta.(N+1)`). Major
        # bumps require explicit `--to X.Y.0` or `PEAKS_NEXT_MAJOR` env
        # override. When the local version already matches the tag, the
        # script is a no-op (idempotent — see the Idempotency guard
        # step above for AC7). For `workflow_dispatch` runs, the same
        # env / flag pattern works — the script does NOT auto-create a
        # tag (that remains the operator's job).
        #
        # 2026-07-23 follow-up (peaks-publish-stale fix, AC6):
        # bump-version.mjs now ALSO bumps
        # packages/peaks-loop-shared/package.json#version in lockstep.
        # No env gate is required: the gate was the Layer 2 root
        # cause (CI env was set, local dev was not). bump-version.mjs
        # is now the single owner of the shared/version bump.
        env:
          INPUT_TARGET: ${{ inputs.target_version || '' }}
        run: |
          if [ -n "${INPUT_TARGET}" ]; then
            node ./scripts/bump-version.mjs --to "${INPUT_TARGET}"
          else
            node ./scripts/bump-version.mjs
          fi

      - name: Sync README badges to new version
        # 2026-07-22 follow-up: keep the `Latest` / `最新版本` row in
        # both READMEs in lockstep with the just-bumped version. The
        # release-page link stays the same (GitHub renders the latest
        # tag by default); only the displayed version text changes.
        run: node ./scripts/sync-readme-version.mjs

      - name: Build (runs subpackage builds before root tsc — required so
          # workspace:* deps provide dist/* .d.ts/.js exports for typecheck
          # resolution against `tsconfig.build.json`; standalone tsc before
          # this step will fail with "Cannot find module 'peaks-loop-shared/*'")
        # 2026-07-23 follow-up (peaks-publish-stale fix, AC6): the
        # PEAKS_AUTO_BUMP_SHARED env var is no longer required —
        # bump-version.mjs owns the shared version bump and always runs
        # when root version changes. We keep the var unset to prove the
        # fix does NOT depend on this env (the prior Layer 2 root cause).
        run: pnpm run build

      # Typecheck is now performed as part of `pnpm run build` (the root
      # tsc -p tsconfig.build.json step, gated by subpackage dist presence).

      - name: Vitest (release pack-only, non-blocking)
        # The release-pack tests verify the OIDC tarball pipeline
        # (workspace:* rewrite, version pin, tamper detection).
        # They run in best-effort mode: a test failure is logged
        # but does NOT block publish, because the production fix is
        # exercised end-to-end by the `node ./scripts/release-pack.mjs`
        # step below (which packs, verifies, and publishes each
        # tarball via npm OIDC). The `tests` workflow on PR and
        # `pnpm test:full` locally run the broader unit suite.
        continue-on-error: true
        run: pnpm exec vitest run --reporter=default tests/unit/release/ tests/unit/hook-binary-build-regression.test.ts
        env:
          TZ: UTC

      - name: Refuse to publish if any .changeset/*.md is staged (hard gate)
        # 2026-07-22 root-cause fix: the prior workflow conditionally
        # ran `pnpm exec changeset version` whenever a `.changeset/*.md`
        # existed, which silently overrode maintainer-pinned versions on
        # tag pushes (the v4.0.0-beta.21 → 4.0.2 → 4.0.0 accidents).
        # We removed the run-changeset-version step entirely; this gate
        # now REFUSES to publish if the operator forgot to delete the
        # pending changeset (forcing them to either delete it or commit
        # it first). The two paths are mutually exclusive: manual pin +
        # clean changeset/ folder, OR changeset-driven bump (consume
        # the changeset locally via `pnpm changeset version` before
        # tagging).
        id: gate-changeset
        run: |
          stale=$(ls .changeset 2>/dev/null \
            | grep -v '^config\.json$' \
            | grep -v '^README\.md$' \
            | grep '\.md$' || true)
          if [ -n "${stale}" ]; then
            echo "::error title=stale changesets::${stale}"
            echo "::error::publish.yml refuses to publish while .changeset/*.md is staged."
            echo "::error::Either delete the file(s), or consume them locally via 'pnpm changeset version' and commit the manifest bump."
            exit 1
          fi

      - name: Verify peaks-loop-shared tarball CLI_VERSION parity (Layer 5 + on-disk gate)
        # 2026-07-23 follow-up (peaks-publish-stale fix, AC1 + AC4): the
        # prior version of this gate read the on-disk
        # packages/peaks-loop-shared/dist/version.js. That file DOES
        # exist on disk (the build step regenerates it). But `pnpm pack`
        # MAY silently skip dist/version.js in some incremental tsc
        # scenarios — Layer 3 of the diagnosis. So the on-disk gate
        # passes while the tarball ships stale content.
        #
        # The structural fix (Layer 5): after the on-disk check passes,
        # we ALSO run `pnpm --filter peaks-loop-shared pack` and
        # verify that the packed tarball's package/dist/version.js
        # carries the expected CLI_VERSION (= root version). On-disk
        # gate AND tarball-content gate must BOTH pass. Failure of
        # either gate aborts the publish before `npm publish` runs.
        id: gate-cli-version
        run: |
          # ---- (A) On-disk gate: defensive file presence + value check
          if [ ! -f packages/peaks-loop-shared/dist/version.js ]; then
            echo "::error title=missing shared dist/version.js::publish.yml refuses to publish when peaks-loop-shared/dist/version.js is missing (did sync-version.mjs run before this gate?)"
            exit 1
          fi
          root_version=$(node -e "console.log(require('./package.json').version)")
          shared_cli_version=$(grep -oE 'CLI_VERSION = "[^"]+"' packages/peaks-loop-shared/dist/version.js | head -1 \
            | sed -E 's/CLI_VERSION = "([^"]+)"/\1/')
          if [ "${shared_cli_version}" != "${root_version}" ]; then
            echo "::error title=CLI_VERSION drift::peaks-loop-shared on-disk carries ${shared_cli_version} but root package.json is ${root_version}"
            echo "::error::publish.yml refuses to publish when peaks-loop-shared/dist/version.js lags the root version."
            echo "::error::Fix: bump packages/peaks-loop-shared/package.json to a new version, commit, then re-tag. This avoids peaks-loop@<new> pinning a stale peaks-loop-shared@<old>."
            echo "::error::Detail: ../.peaks/memory/peaks-cli-version-shared-chicken-egg.md"
            exit 1
          fi
          echo "On-disk CLI_VERSION alignment OK: peaks-loop@${root_version} -> peaks-loop-shared@${shared_cli_version}"

          # ---- (B) Tarball-content gate (AC4): pack shared, verify the
          # packed tarball's package/dist/version.js carries the same
          # CLI_VERSION. This is the Layer 5 fix — on-disk != tarball.
          tmp=$(mktemp -d)
          trap "rm -rf ${tmp}" EXIT
          pnpm --filter peaks-loop-shared pack --pack-destination "${tmp}" >/dev/null
          shared_tgz="${tmp}/peaks-loop-shared-$(node -e "console.log(require('./packages/peaks-loop-shared/package.json').version)").tgz"
          if [ ! -f "${shared_tgz}" ]; then
            echo "::error title=pack produced no tarball::pnpm --filter peaks-loop-shared pack did not produce ${shared_tgz}"
            exit 1
          fi
          # Extract package/dist/version.js and read the literal value.
          tar -xzf "${shared_tgz}" -C "${tmp}/extract" 2>/dev/null || mkdir -p "${tmp}/extract" && tar -xzf "${shared_tgz}" -C "${tmp}/extract"
          if [ ! -f "${tmp}/extract/package/dist/version.js" ]; then
            echo "::error title=stale-tarball::peaks-loop-shared tarball is MISSING package/dist/version.js. Layer 3 root cause: shared tsc incremental build silently skipped dist/version.js. Refusing to publish."
            echo "::error::Fix: clean shared/dist (rm -rf packages/peaks-loop-shared/dist) and re-run pnpm run build, or switch to 'tsc -b' (project references)."
            echo "::error::Detail: ../.peaks/memory/peaks-stale-cli-version-2026-07-23-diagnosis.md"
            exit 1
          fi
          packed_cli_version=$(grep -oE 'CLI_VERSION = "[^"]+"' "${tmp}/extract/package/dist/version.js" | head -1 \
            | sed -E 's/CLI_VERSION = "([^"]+)"/\1/')
          if [ "${packed_cli_version}" != "${root_version}" ]; then
            echo "::error title=tarball CLI_VERSION drift::peaks-loop-shared tarball carries CLI_VERSION=${packed_cli_version} but root package.json is ${root_version}. The pack step produced a stale tarball (Layer 3 + Layer 5). Refusing to publish."
            echo "::error::Detail: ../.peaks/memory/peaks-stale-cli-version-2026-07-23-diagnosis.md"
            exit 1
          fi
          echo "Tarball CLI_VERSION alignment OK: peaks-loop-shared@$(node -e "console.log(require('./packages/peaks-loop-shared/package.json').version)") tarball package/dist/version.js = ${packed_cli_version}"

      - name: Publish to npm (OIDC + scripts/release-pack.mjs)
        # All-in-one publish script:
        #   - packs each workspace package with `pnpm pack` (rewrites
        #     workspace:* to exact versions so the registry install
        #     does not need pnpm to resolve the protocol),
        #   - inspects the packed manifest to ensure zero workspace:*
        #     leaks and that every internal dep matches the local
        #     manifest version,
        #   - publishes each tarball via `npm publish <tarball>` so the
        #     npm 11+ OIDC Trusted Publishing flow remains in effect,
        #   - publishes in dependency-safe order (shared first, root
        #     last) and fails the workflow on the FIRST error — no
        #     warning-and-continue.
        # Defence-in-depth: this step is gated on a `v*.*.*` tag
        # OR an explicit `workflow_dispatch`. A direct push to `main`
        # cannot run it. The `on:` block at the top of this file
        # already excludes non-tag branches; the per-step `if:` is
        # belt-and-braces so a future refactor of `on:` cannot
        # silently turn push-to-main into a registry release.
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        run: node ./scripts/release-pack.mjs
        # NO NODE_AUTH_TOKEN here — npm CLI 11 + Trusted Publishing
        # interprets any NODE_AUTH_TOKEN as "I have credentials, use
        # those", which suppresses the OIDC flow that npmjs.com is
        # actually configured for. The publish.yml permission block
        # above already grants id-token: write, so the OIDC JWT will
        # be minted automatically; NODE_AUTH_TOKEN must remain unset.